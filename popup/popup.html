<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistral AI Chat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🔥 Mistral AI</div>
      <button id="settings-btn" class="settings-btn" title="Paramètres">⚙️</button>
    </div>

    <div class="chat-container">
      <div id="chat-messages" class="messages"></div>
    </div>

    <div class="input-area">
      <textarea id="user-input" class="message-input" placeholder="Écrivez votre message..." rows="3"></textarea>
      <button id="send-btn" class="send-btn">Envoyer</button>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Paramètres</h2>
          <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <label for="api-key-input">Clé API Mistral:</label>
          <input type="password" id="api-key-input" placeholder="Entrez votre clé API" class="input-field">
          <label for="model-select">Modèle:</label>
          <select id="model-select" class="input-field">
            <option value="mistral-small">Mistral Small</option>
            <option value="mistral-medium">Mistral Medium</option>
            <option value="mistral-large">Mistral Large</option>
          </select>
          <label for="temperature-input">Température (0-1):</label>
          <input type="number" id="temperature-input" min="0" max="1" step="0.1" value="0.7" class="input-field">
          <label>
            <input type="checkbox" id="dark-mode-toggle">
            Mode sombre
          </label>
        </div>
        <div class="modal-footer">
          <button id="clear-history-btn" class="btn-danger">Effacer l'historique</button>
          <button id="save-settings-btn" class="btn-primary">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../src/storage.js"></script>
  <script src="../src/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
