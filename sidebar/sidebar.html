<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistral AI Assistant</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">🔥 Mistral AI</div>
      <button id="settings-btn" class="icon-btn" title="Paramètres">⚙️</button>
    </header>

    <div class="quick-actions">
      <button class="action-chip" data-action="summarize">📄 Résumer la page</button>
      <button class="action-chip" data-action="explain">💡 Expliquer la sélection</button>
      <button class="action-chip" data-action="key-points">🔑 Points clés</button>
    </div>

    <main class="chat-container">
      <div id="chat-messages" class="messages">
        <div class="welcome">
          <p>👋 Bonjour ! Je suis votre assistant Mistral AI.</p>
          <p>Posez-moi une question, ou utilisez les actions rapides ci-dessus pour interagir avec la page courante.</p>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <textarea id="user-input" class="message-input" placeholder="Écrivez votre message..." rows="2"></textarea>
      <button id="send-btn" class="send-btn" title="Envoyer">➤</button>
    </footer>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Paramètres</h2>
          <button id="close-modal" class="icon-btn">&times;</button>
        </div>
        <div class="modal-body">
          <label for="api-key-input">Clé API Mistral</label>
          <input type="password" id="api-key-input" placeholder="Entrez votre clé API" class="input-field">
          <label for="model-select">Modèle</label>
          <select id="model-select" class="input-field">
            <option value="mistral-small-latest">Mistral Small</option>
            <option value="mistral-medium-latest">Mistral Medium</option>
            <option value="mistral-large-latest">Mistral Large</option>
          </select>
          <label for="temperature-input">Température (0-1)</label>
          <input type="number" id="temperature-input" min="0" max="1" step="0.1" value="0.7" class="input-field">
          <label class="checkbox-label">
            <input type="checkbox" id="page-context-toggle" checked>
            Inclure le contexte de la page
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="dark-mode-toggle">
            Mode sombre
          </label>
        </div>
        <div class="modal-footer">
          <button id="clear-history-btn" class="btn-danger">Effacer l'historique</button>
          <button id="save-settings-btn" class="btn-primary">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../src/storage.js"></script>
  <script src="../src/api.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
